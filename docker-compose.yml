services:
  # ── PostgreSQL ──────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-hr_agent}
      POSTGRES_USER:     ${POSTGRES_USER:-hr_agent}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hr_agent}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── HR Agent Bot ────────────────────────────────────────────
  bot:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_HOST: db            # переопределяем хост на имя сервиса
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
      - ./uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
